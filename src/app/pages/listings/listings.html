<section class="listings-shell">
  <div class="listings-header">
    <h1>Annonces</h1>
    <p>Decouvre les annonces disponibles.</p>
  </div>

  <p class="state loading" *ngIf="loading$ | async">Chargement des annonces...</p>
  <p class="state error" *ngIf="errorMsg$ | async as errorMsg" [hidden]="!errorMsg">{{ errorMsg }}</p>

  <div class="listings-grid" *ngIf="!(loading$ | async) && !(errorMsg$ | async)">
    <ng-container *ngIf="listings$ | async as listings">
      <article class="listing-card" *ngFor="let listing of listings">
        <img [src]="getImageUrl(listing)" [alt]="listing.title" class="listing-image" />

        <div class="listing-body">
          <h2>{{ listing.title }}</h2>
          <p class="meta">{{ getTypeLabel(listing) }}</p>
          <p class="city">{{ listing.city }}</p>
        </div>
      </article>
      <p class="state empty" *ngIf="listings.length === 0">Aucune annonce disponible.</p>
    </ng-container>
  </div>
</section>
