<section class="my-listings">
  <h2>Mes annonces</h2>
  <p *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</p>
  <ng-container *ngIf="!loading; else loadingTpl">
    <div *ngIf="listings.length; else emptyTpl">
      <ul>
        <li *ngFor="let listing of listings">
          <h3>{{ listing.title }}</h3>
          <p>{{ listing.description }}</p>
          <p><strong>Prix :</strong> {{ listing.price }} €</p>
          <button *ngIf="listing.id as id" (click)="delete(id)" type="button" class="delete-btn">Supprimer</button>
        </li>
      </ul>
    </div>
  </ng-container>

  <ng-template #loadingTpl>
    <p>Chargement...</p>
  </ng-template>
  <ng-template #emptyTpl>
    <p>Aucune annonce trouvée.</p>
  </ng-template>
</section>
