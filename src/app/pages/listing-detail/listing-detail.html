<div class="listing-detail" *ngIf="!loading && listing; else loadingTpl">
	<!-- Titre -->
	<section class="section-title" *ngIf="listing.title">
		<h2>{{ listing.title }}</h2>
	</section>

	<!-- Description -->
	<section class="section-desc" *ngIf="listing.description">
		<h3>Description</h3>
		<p>{{ listing.description }}</p>
	</section>

	<!-- Prix -->
	<section class="section-price" *ngIf="listing.price != null">
		<h3>Prix</h3>
		<p>{{ listing.price }} €</p>
	</section>

	<!-- Localisation -->
	<section class="section-location" *ngIf="listing.city || listing.postalCode">
		<h3>Localisation</h3>
		<p>
			<span *ngIf="listing.city">{{ listing.city }}</span>
			<span *ngIf="listing.city && listing.postalCode">, </span>
			<span *ngIf="listing.postalCode">{{ listing.postalCode }}</span>
		</p>
	</section>

	<!-- Caractéristiques -->
	<section class="section-details">
		<h3>Détails</h3>
		<ul>
						<li *ngIf="listing.seller?.surnom || listing.sellerName || listing.username">
								<b>Vendeur:</b>
								<ng-container *ngIf="listing.seller?.surnom; else sellerNameTpl">{{ listing.seller?.surnom }}</ng-container>
								<ng-template #sellerNameTpl>
									<ng-container *ngIf="listing.sellerName; else usernameTpl">{{ listing.sellerName }}</ng-container>
								</ng-template>
								<ng-template #usernameTpl>{{ listing.username }}</ng-template>
						</li>
		</ul>
	</section>
</div>
<ng-template #loadingTpl>
	<div class="loading" *ngIf="loading">Chargement...</div>
	<div class="error" *ngIf="error">{{ error }}</div>
</ng-template>
